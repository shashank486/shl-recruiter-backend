services:
  - type: web
    name: shl-recruiter-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false          # set this manually in Render dashboard
